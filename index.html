<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Latest research articles from BlockPhi Capital">
  <title>BlockPhi Capital — Research</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --card: #111111;
      --navy: #001F3F;
      --navy-mid: #003166;
      --text-blue: #4A8EC9;
      --white: #fcfcfc;
      --white-60: rgba(252,252,252,0.6);
      --white-40: rgba(252,252,252,0.4);
      --white-25: rgba(252,252,252,0.25);
      --white-06: rgba(252,252,252,0.06);
      --border: rgba(0,31,63,0.3);
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      overflow: hidden;
      background: transparent;
      color: var(--white);
      font-family: 'Cormorant Garamond', Georgia, serif;
      line-height: 1.5;
    }

    body { padding: 0; }

    /* Grid layout — 4 equal columns, full width */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.25rem;
      width: 100%;
      padding: 0 0 1rem;
    }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--white-06);
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.35s var(--ease), border-color 0.35s var(--ease), box-shadow 0.35s var(--ease);
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--border);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .card-img {
      aspect-ratio: 16 / 9;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s var(--ease);
    }

    .card:hover .card-img img { transform: scale(1.05); }

    .card-body {
      padding: 1rem 1.1rem 1.2rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .card-body h3 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 1.05rem;
      line-height: 1.3;
      margin-bottom: 0.5rem;
      color: var(--white);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-body .desc {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--white-40);
      line-height: 1.5;
      margin-bottom: 0.8rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-body .meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.06em;
      color: var(--white-25);
      margin-bottom: 0.8rem;
    }

    .card-body .btn {
      font-family: 'Montserrat', sans-serif;
      background: var(--navy);
      color: var(--white);
      padding: 7px 14px;
      border: 1px solid rgba(0,49,102,0.4);
      border-radius: 4px;
      text-decoration: none;
      display: inline-block;
      margin-top: auto;
      font-weight: 500;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      text-align: center;
      transition: background 0.3s var(--ease);
    }

    .card-body .btn:hover { background: var(--navy-mid); }

    /* View all link */
    .view-all {
      padding: 0.6rem 0 0;
    }

    .view-all a {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--text-blue);
      text-decoration: none;
      transition: color 0.3s var(--ease);
    }

    .view-all a:hover { color: var(--white); }

    /* Status messages */
    .msg {
      text-align: center;
      padding: 40px;
      background: var(--card);
      border: 1px solid var(--white-06);
      border-radius: 4px;
      font-weight: 300;
      color: var(--white-40);
      grid-column: 1 / -1;
    }

    .msg--err { color: #e74c3c; }

    /* Responsive */
    @media (max-width: 960px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 540px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="grid" id="grid">
    <div class="msg">Loading latest articles...</div>
  </div>

  <div class="view-all">
    <a href="https://medium.com/@jackgreencrypto" target="_blank" rel="noopener noreferrer">
      Read All Articles &rsaquo;
    </a>
  </div>

  <script>
    const FEED = 'https://medium.com/feed/@jackgreencrypto';
    const API  = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(FEED);
    const grid = document.getElementById('grid');

    function sanitize(url) {
      return url ? url.replace(/^\/\//, 'https://') : '';
    }

    function extractImg(html) {
      const m = html.match(/<img[^>]+src=["']([^"']+)/);
      return m ? sanitize(m[1]) : '';
    }

    fetch(API)
      .then(r => { if (!r.ok) throw Error(); return r.json(); })
      .then(data => {
        if (data.status !== 'ok') throw Error(data.message);

        const items = data.items.slice(0, 4);
        grid.innerHTML = '';

        if (!items.length) {
          grid.innerHTML = '<div class="msg">No articles found.</div>';
          return;
        }

        items.forEach(item => {
          const desc = item.description.replace(/<[^>]*>/g, '').slice(0, 140);
          const date = new Date(item.pubDate);
          const fmt  = date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: '2-digit' });
          const days = Math.floor((Date.now() - date) / 864e5);
          const img  = extractImg(item.description);

          const el = document.createElement('div');
          el.className = 'card';
          el.innerHTML =
            (img ? '<div class="card-img"><img src="' + img + '" alt="" loading="lazy"></div>' : '') +
            '<div class="card-body">' +
              '<h3>' + item.title + '</h3>' +
              '<p class="desc">' + desc + '</p>' +
              '<p class="meta">' + fmt + ' &middot; ' + days + 'd ago</p>' +
              '<a class="btn" href="' + item.link + '" target="_blank" rel="noopener">Read more</a>' +
            '</div>';
          grid.appendChild(el);
        });
      })
      .catch(() => {
        grid.innerHTML = '<div class="msg msg--err">Failed to load articles.</div>';
      });
  </script>
</body>
</html>
