<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Latest research articles from BlockPhi Capital">
  <title>BlockPhi Capital — Research</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --card: #111111;
      --navy: #001F3F;
      --navy-mid: #003166;
      --text-blue: #4A8EC9;
      --white: #fcfcfc;
      --white-60: rgba(252,252,252,0.6);
      --white-40: rgba(252,252,252,0.4);
      --white-25: rgba(252,252,252,0.25);
      --white-06: rgba(252,252,252,0.06);
      --border: rgba(0,31,63,0.3);
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      overflow: hidden;
      background: transparent;
      color: var(--white);
      font-family: 'Cormorant Garamond', Georgia, serif;
      line-height: 1.5;
    }

    body { padding: 10px 0 20px; }

    /* Carousel wrapper */
    .carousel {
      position: relative;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 50px;
    }

    .track-clip { overflow: hidden; }

    .track {
      display: flex;
      gap: 32px;
      padding: 10px 0 16px;
      transition: transform 0.5s var(--ease);
    }

    /* Cards */
    .card {
      flex: 0 0 calc(33.333% - 22px);
      max-width: calc(33.333% - 22px);
      background: var(--card);
      border: 1px solid var(--white-06);
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.35s var(--ease), border-color 0.35s var(--ease), box-shadow 0.35s var(--ease);
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--border);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .card-img {
      height: 160px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s var(--ease);
    }

    .card:hover .card-img img { transform: scale(1.05); }

    .card-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .card-body h3 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 1.25rem;
      line-height: 1.3;
      margin-bottom: 0.6rem;
      color: var(--white);
    }

    .card-body .desc {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--white-40);
      line-height: 1.5;
      margin-bottom: 1rem;
    }

    .card-body .meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      color: var(--white-25);
      margin-bottom: 1rem;
    }

    .card-body .btn {
      font-family: 'Montserrat', sans-serif;
      background: var(--navy);
      color: var(--white);
      padding: 8px 16px;
      border: 1px solid rgba(0,49,102,0.4);
      border-radius: 4px;
      text-decoration: none;
      display: inline-block;
      margin-top: auto;
      font-weight: 500;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      text-align: center;
      transition: background 0.3s var(--ease);
    }

    .card-body .btn:hover { background: var(--navy-mid); }

    /* Arrows */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      background: transparent;
      border: none;
      opacity: 0.5;
      transition: opacity 0.3s var(--ease);
    }

    .arrow:hover { opacity: 1; }
    .arrow--prev { left: 6px; }
    .arrow--next { right: 6px; }
    .arrow[disabled] { opacity: 0.12; cursor: default; pointer-events: none; }

    .arrow svg {
      width: 28px;
      height: 28px;
      fill: var(--white-60);
    }

    /* View all link */
    .view-all {
      max-width: 1000px;
      margin: 0 auto;
      padding: 8px 50px 0;
    }

    .view-all a {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--text-blue);
      text-decoration: none;
      transition: color 0.3s var(--ease);
    }

    .view-all a:hover { color: var(--white); }

    /* Status messages */
    .msg {
      text-align: center;
      padding: 40px;
      background: var(--card);
      border: 1px solid var(--white-06);
      border-radius: 4px;
      font-weight: 300;
      color: var(--white-40);
      width: 100%;
    }

    .msg--err { color: #e74c3c; }

    /* Responsive */
    @media (max-width: 1024px) {
      .card {
        flex: 0 0 calc(50% - 16px);
        max-width: calc(50% - 16px);
      }
      .carousel, .view-all { padding-left: 40px; padding-right: 40px; }
    }

    @media (max-width: 640px) {
      .card { flex: 0 0 100%; max-width: 100%; }
      .carousel, .view-all { padding-left: 30px; padding-right: 30px; }
      .arrow svg { width: 22px; height: 22px; }
    }
  </style>
</head>
<body>
  <div class="carousel">
    <div class="track-clip">
      <div class="track" id="track">
        <div class="msg">Loading latest articles...</div>
      </div>
    </div>
    <button class="arrow arrow--prev" id="prev" disabled aria-label="Previous">
      <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>
    <button class="arrow arrow--next" id="next" disabled aria-label="Next">
      <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
    </button>
  </div>

  <div class="view-all">
    <a href="https://medium.com/@jackgreencrypto" target="_blank" rel="noopener noreferrer">
      Read All Articles &rsaquo;
    </a>
  </div>

  <script>
    const FEED = 'https://medium.com/feed/@jackgreencrypto';
    const API  = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(FEED);

    const track = document.getElementById('track');
    const prev  = document.getElementById('prev');
    const next  = document.getElementById('next');

    let pos = 0, total = 0, visible = 3;

    function getVisible() {
      const w = window.innerWidth;
      return w <= 640 ? 1 : w <= 1024 ? 2 : 3;
    }

    function slide() {
      const card = track.children[0];
      if (!card) return;
      const gap = 32;
      track.style.transform = 'translateX(-' + pos * (card.offsetWidth + gap) + 'px)';
      prev.disabled = pos === 0;
      next.disabled = pos >= total - visible;
    }

    prev.addEventListener('click', () => { if (pos > 0) { pos--; slide(); } });
    next.addEventListener('click', () => { if (pos < total - visible) { pos++; slide(); } });

    window.addEventListener('resize', () => {
      visible = getVisible();
      if (pos > total - visible) pos = Math.max(0, total - visible);
      slide();
    });

    function sanitize(url) {
      return url ? url.replace(/^\/\//, 'https://') : '';
    }

    function extractImg(html) {
      const m = html.match(/<img[^>]+src=["']([^"']+)/);
      return m ? sanitize(m[1]) : '';
    }

    fetch(API)
      .then(r => { if (!r.ok) throw Error(); return r.json(); })
      .then(data => {
        if (data.status !== 'ok') throw Error(data.message);

        const items = data.items;
        total = items.length;
        track.innerHTML = '';

        if (!items.length) {
          track.innerHTML = '<div class="msg">No articles found.</div>';
          return;
        }

        items.forEach(item => {
          const desc = item.description.replace(/<[^>]*>/g, '').slice(0, 180) + '...';
          const date = new Date(item.pubDate);
          const fmt  = date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: '2-digit' });
          const days = Math.floor((Date.now() - date) / 864e5);
          const img  = extractImg(item.description);

          const el = document.createElement('div');
          el.className = 'card';
          el.innerHTML =
            (img ? '<div class="card-img"><img src="' + img + '" alt="' + item.title + '" loading="lazy"></div>' : '') +
            '<div class="card-body">' +
              '<h3>' + item.title + '</h3>' +
              '<p class="desc">' + desc + '</p>' +
              '<p class="meta">Published: ' + fmt + ' &middot; ' + days + ' days ago</p>' +
              '<a class="btn" href="' + item.link + '" target="_blank" rel="noopener">Read more</a>' +
            '</div>';
          track.appendChild(el);
        });

        visible = getVisible();
        slide();
      })
      .catch(() => {
        track.innerHTML = '<div class="msg msg--err">Failed to load articles.</div>';
        prev.style.display = 'none';
        next.style.display = 'none';
      });
  </script>
</body>
</html>
