<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Latest research articles from BlockPhi Capital">
  <title>BlockPhi Capital — Research</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --card: #111111;
      --navy: #001F3F;
      --navy-mid: #003166;
      --text-blue: #4A8EC9;
      --white: #fcfcfc;
      --white-60: rgba(252,252,252,0.6);
      --white-40: rgba(252,252,252,0.4);
      --white-25: rgba(252,252,252,0.25);
      --white-06: rgba(252,252,252,0.06);
      --border: rgba(0,31,63,0.3);
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      overflow: hidden;
      background: transparent;
      color: var(--white);
      font-family: 'Cormorant Garamond', Georgia, serif;
      line-height: 1.5;
    }

    body { padding: 0; }

    /* ── Carousel wrapper ── */
    .carousel {
      position: relative;
      width: 100%;
    }

    .track-clip {
      overflow: hidden;
      padding: 4px 0 8px;
    }

    .track {
      display: grid;
      grid-template-rows: 1fr 1fr;
      grid-auto-flow: column;
      grid-auto-columns: calc(25% - 15px);
      gap: 1.1rem 1.25rem;
      transition: transform 0.55s var(--ease);
    }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--white-06);
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.35s var(--ease), border-color 0.35s var(--ease), box-shadow 0.35s var(--ease);
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: var(--border);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .card-img {
      aspect-ratio: 16 / 9;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s var(--ease);
    }

    .card:hover .card-img img { transform: scale(1.04); }

    .card-body {
      padding: 0.85rem 1rem 1rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .card-body h3 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 0.95rem;
      line-height: 1.3;
      margin-bottom: 0.4rem;
      color: var(--white);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-body .meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.06em;
      color: var(--white-25);
      margin-top: auto;
    }

    /* Entire card is clickable */
    .card { cursor: pointer; text-decoration: none; }

    /* ── Bottom bar: arrows + view all ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 0 0;
    }

    .arrows {
      display: flex;
      gap: 0.5rem;
    }

    .arrow {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: var(--card);
      border: 1px solid var(--white-06);
      border-radius: 4px;
      opacity: 0.6;
      transition: opacity 0.3s var(--ease), border-color 0.3s var(--ease);
    }

    .arrow:hover {
      opacity: 1;
      border-color: var(--border);
    }

    .arrow[disabled] {
      opacity: 0.15;
      cursor: default;
      pointer-events: none;
    }

    .arrow svg {
      width: 18px;
      height: 18px;
      fill: var(--white-60);
    }

    .view-all a {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--text-blue);
      text-decoration: none;
      transition: color 0.3s var(--ease);
    }

    .view-all a:hover { color: var(--white); }

    /* ── Dots ── */
    .dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--white-25);
      border: none;
      cursor: pointer;
      transition: background 0.3s var(--ease), transform 0.3s var(--ease);
      padding: 0;
    }

    .dot.active {
      background: var(--text-blue);
      transform: scale(1.3);
    }

    .dot:hover:not(.active) {
      background: var(--white-40);
    }

    /* ── Status messages ── */
    .msg {
      text-align: center;
      padding: 40px;
      background: var(--card);
      border: 1px solid var(--white-06);
      border-radius: 4px;
      font-weight: 300;
      color: var(--white-40);
      grid-column: 1 / -1;
      grid-row: 1 / -1;
    }

    .msg--err { color: #e74c3c; }

    /* ── Responsive ── */
    @media (max-width: 960px) {
      .track {
        grid-auto-columns: calc(50% - 10px);
      }
    }

    @media (max-width: 540px) {
      .track {
        grid-template-rows: 1fr;
        grid-auto-columns: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="carousel">
    <div class="track-clip">
      <div class="track" id="track">
        <div class="msg">Loading latest articles...</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="arrows">
      <button class="arrow" id="prev" disabled aria-label="Previous">
        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      </button>
      <button class="arrow" id="next" disabled aria-label="Next">
        <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </button>
      <div class="dots" id="dots"></div>
    </div>
    <div class="view-all">
      <a href="https://medium.com/@jackgreencrypto" target="_blank" rel="noopener noreferrer">
        Read All Articles &rsaquo;
      </a>
    </div>
  </div>

  <script>
    const FEED = 'https://medium.com/feed/@jackgreencrypto';
    const API  = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(FEED);

    const track = document.getElementById('track');
    const prev  = document.getElementById('prev');
    const next  = document.getElementById('next');
    const dotsC = document.getElementById('dots');

    let page = 0, totalPages = 0;

    /* How many columns are visible at once */
    function getVisible() {
      const w = window.innerWidth;
      return w <= 540 ? 1 : w <= 960 ? 2 : 4;
    }

    /* How many rows */
    function getRows() {
      return window.innerWidth <= 540 ? 1 : 2;
    }

    function slide() {
      const visible = getVisible();
      const rows = getRows();
      const cardsPerPage = visible * rows;
      const totalCards = track.children.length;
      totalPages = Math.ceil(totalCards / cardsPerPage);

      /* Clamp page */
      if (page >= totalPages) page = totalPages - 1;
      if (page < 0) page = 0;

      /* Calculate offset: move by `visible` columns per page */
      const card = track.children[0];
      if (!card) return;
      const gap = parseFloat(getComputedStyle(track).columnGap) || 20;
      const colWidth = card.offsetWidth + gap;
      const offset = page * visible * colWidth;

      track.style.transform = 'translateX(-' + offset + 'px)';
      prev.disabled = page === 0;
      next.disabled = page >= totalPages - 1;

      /* Update dots */
      dotsC.innerHTML = '';
      for (let i = 0; i < totalPages; i++) {
        const dot = document.createElement('button');
        dot.className = 'dot' + (i === page ? ' active' : '');
        dot.setAttribute('aria-label', 'Page ' + (i + 1));
        dot.addEventListener('click', () => { page = i; slide(); });
        dotsC.appendChild(dot);
      }
    }

    prev.addEventListener('click', () => { if (page > 0) { page--; slide(); } });
    next.addEventListener('click', () => { if (page < totalPages - 1) { page++; slide(); } });

    window.addEventListener('resize', () => { slide(); });

    function extractImg(html) {
      const m = html.match(/<img[^>]+src=["']([^"']+)/);
      return m ? (m[1].replace(/^\/\//, 'https://')) : '';
    }

    fetch(API)
      .then(r => { if (!r.ok) throw Error(); return r.json(); })
      .then(data => {
        if (data.status !== 'ok') throw Error(data.message);

        const items = data.items;
        track.innerHTML = '';

        if (!items.length) {
          track.innerHTML = '<div class="msg">No articles found.</div>';
          return;
        }

        items.forEach(item => {
          const date = new Date(item.pubDate);
          const fmt  = date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: '2-digit' });
          const days = Math.floor((Date.now() - date) / 864e5);
          const img  = extractImg(item.description);

          const el = document.createElement('a');
          el.className = 'card';
          el.href = item.link;
          el.target = '_blank';
          el.rel = 'noopener noreferrer';
          el.innerHTML =
            (img ? '<div class="card-img"><img src="' + img + '" alt="" loading="lazy"></div>' : '') +
            '<div class="card-body">' +
              '<h3>' + item.title + '</h3>' +
              '<p class="meta">' + fmt + ' &middot; ' + days + 'd ago</p>' +
            '</div>';
          track.appendChild(el);
        });

        slide();
      })
      .catch(() => {
        track.innerHTML = '<div class="msg msg--err">Failed to load articles.</div>';
      });
  </script>
</body>
</html>
